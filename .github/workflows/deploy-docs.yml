name: 部署文档
on:
  push:
    branches:
      - master
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy-gh-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs & print file hash
        env:
          NODE_OPTIONS: --max_old_space_size=12288
        run: |
          pnpm run docs:build
          touch src/.vuepress/dist/.nojekyll
          ls src/.vuepress/dist
          find src/.vuepress/dist -type f -print0 | xargs -0 sha256sum > dist-hash.log
          cat dist-hash.log

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4.6.9
        with:
          branch: gh-pages
          folder: src/.vuepress/dist
          clean: true
          token: ${{ secrets.GITHUB_TOKEN }}
